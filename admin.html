<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laxtania — Prestige Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --navy: #0d1b2e;
    --navy-mid: #132340;
    --navy-light: #1a2f52;
    --gold: #c9a84c;
    --gold-light: #e4c97e;
    --gold-dim: #8a6e30;
    --parchment: #f5edd8;
    --text: #e8dfc8;
    --text-dim: #9a8e70;
    --border: rgba(201,168,76,0.25);
    --border-bright: rgba(201,168,76,0.6);
    --red: #c0392b;
    --red-dim: rgba(192,57,43,0.15);
    --green: #27ae60;
    --green-dim: rgba(39,174,96,0.12);
    --shadow: 0 4px 32px rgba(0,0,0,0.6);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }

  /* ── GATE (passphrase screen) ── */
  #gate {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    flex-direction: column; gap: 24px; text-align: center;
  }
  .gate-title {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    letter-spacing: 0.1em;
  }
  .gate-sub { color: var(--text-dim); font-style: italic; }
  .gate-form { display: flex; flex-direction: column; gap: 14px; align-items: center; }
  #passphraseInput {
    background: var(--navy-mid);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    padding: 12px 20px;
    width: 260px;
    text-align: center;
    outline: none;
  }
  #passphraseInput:focus { border-color: var(--gold); }
  #gateError { color: #e74c3c; font-style: italic; font-size: 0.85rem; min-height: 1.2em; }

  /* ── MAIN ADMIN ── */
  #adminPanel { display: none; }

  header {
    text-align: center;
    padding: 36px 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .admin-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    color: var(--gold-light);
    letter-spacing: 0.05em;
  }
  .header-actions {
    margin-top: 14px;
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }

  /* ── LAYOUT ── */
  .admin-wrap {
    max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 760px) { .admin-wrap { grid-template-columns: 1fr; } }
  .full-width { grid-column: 1 / -1; }

  /* ── SECTION CARDS ── */
  .section-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    padding: 22px;
  }
  .section-card h2 {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ── FORM ELEMENTS ── */
  label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  input[type=text], input[type=number], select {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    font-size: 0.95rem;
    padding: 9px 12px;
    margin-bottom: 12px;
    outline: none;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--gold); }
  select option { background: var(--navy-mid); }

  .form-row { display: flex; gap: 10px; }
  .form-row > * { flex: 1; }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    padding: 9px 20px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-gold {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--gold-light);
  }
  .btn-gold:hover { background: rgba(201,168,76,0.22); }
  .btn-danger {
    background: var(--red-dim);
    border-color: var(--red);
    color: #e74c3c;
    font-size: 0.6rem;
    padding: 5px 10px;
  }
  .btn-danger:hover { background: rgba(192,57,43,0.25); }
  .btn-sm {
    font-size: 0.6rem;
    padding: 5px 12px;
  }
  .btn-platinum {
    background: rgba(95,212,244,0.08);
    border-color: #5fd4f4;
    color: #5fd4f4;
  }
  .btn-platinum:hover { background: rgba(95,212,244,0.15); }

  /* ── MEMBER LIST ── */
  .member-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,0.06);
    flex-wrap: wrap;
  }
  .member-row:last-child { border-bottom: none; }
  .member-row-name {
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    color: var(--text);
    flex: 1;
    min-width: 100px;
  }
  .member-row-pts {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-light);
    min-width: 60px;
    text-align: right;
  }
  .member-row-family {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
    min-width: 80px;
  }
  .member-edit-form {
    display: none;
    width: 100%; padding: 12px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    margin-top: 6px;
  }
  .member-edit-form.open { display: block; }

  /* ── FAMILY LIST ── */
  .family-row {
    padding: 12px 0;
    border-bottom: 1px solid rgba(201,168,76,0.06);
  }
  .family-row:last-child { border-bottom: none; }
  .family-row-header {
    display: flex; align-items: center; gap: 8px;
  }
  .family-row-name {
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    color: var(--gold-light);
    flex: 1;
  }
  .family-row-bonus {
    font-size: 0.8rem;
    color: #5fd4f4;
  }
  .family-edit-form {
    display: none; margin-top: 10px;
    padding: 12px; background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
  }
  .family-edit-form.open { display: block; }

  /* ── TIER CONFIG ── */
  .tier-config-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(201,168,76,0.06);
  }
  .tier-config-row:last-child { border-bottom: none; }
  .tier-color-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0;
  }
  .tier-config-name { font-family: 'Cinzel', serif; font-size: 0.82rem; flex: 1; }
  .tier-config-pts { font-size: 0.82rem; color: var(--text-dim); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--navy-mid);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    padding: 12px 28px;
    transition: transform 0.3s ease;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── PASSPHRASE CHANGE SECTION ── */
  .danger-zone {
    border-color: rgba(192,57,43,0.4);
  }
  .danger-zone h2 { color: rgba(192,57,43,0.7); }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div>
    <div class="gate-title">⚔ Council Access</div>
    <p class="gate-sub" style="margin-top:6px">Prestige Registry — Admin Panel</p>
  </div>
  <div class="gate-form">
    <label for="passphraseInput">PASSPHRASE</label>
    <input type="password" id="passphraseInput" placeholder="· · · · · · · ·" autocomplete="off">
    <button class="btn btn-gold" onclick="checkPassphrase()">Enter the Council Chamber</button>
    <div id="gateError"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <header>
    <div class="admin-eyebrow">Laxtania Council · Admin Panel</div>
    <h1>Prestige Administration</h1>
    <div class="header-actions">
      <a href="index.html" class="btn btn-gold">← View Public Page</a>
      <button class="btn btn-platinum" onclick="openAddMember()">+ Add Member</button>
      <button class="btn btn-platinum btn-sm" style="border-color:var(--gold-dim);color:var(--gold-dim)" onclick="openAddFamily()">+ Add Family</button>
    </div>
  </header>

  <div class="admin-wrap">

    <!-- ADD MEMBER FORM -->
    <div class="section-card full-width" id="addMemberCard" style="display:none">
      <h2>ADD MEMBER</h2>
      <div class="form-row">
        <div>
          <label>IN-GAME NAME</label>
          <input type="text" id="newMemberName" placeholder="e.g. Stolker">
        </div>
        <div>
          <label>ROLE</label>
          <select id="newMemberRole">
            <option value="member">Member</option>
            <option value="officer">Officer</option>
            <option value="co-leader">Co-Leader</option>
            <option value="leader">Leader</option>
          </select>
        </div>
        <div>
          <label>FAMILY</label>
          <select id="newMemberFamily">
            <option value="">— No Family —</option>
          </select>
        </div>
        <div>
          <label>STARTING POINTS</label>
          <input type="number" id="newMemberPoints" value="0" min="0">
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-gold" onclick="addMember()">Record Member</button>
        <button class="btn btn-sm" style="border-color:var(--text-dim);color:var(--text-dim)" onclick="document.getElementById('addMemberCard').style.display='none'">Cancel</button>
      </div>
    </div>

    <!-- ADD FAMILY FORM -->
    <div class="section-card full-width" id="addFamilyCard" style="display:none">
      <h2>ADD FAMILY</h2>
      <div class="form-row">
        <div>
          <label>FAMILY NAME</label>
          <input type="text" id="newFamilyName" placeholder="e.g. House Ravenmoor">
        </div>
        <div>
          <label>BONUS POINTS</label>
          <input type="number" id="newFamilyBonus" value="0" min="0">
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-gold" onclick="addFamily()">Establish Family</button>
        <button class="btn btn-sm" style="border-color:var(--text-dim);color:var(--text-dim)" onclick="document.getElementById('addFamilyCard').style.display='none'">Cancel</button>
      </div>
    </div>

    <!-- MEMBERS LIST -->
    <div class="section-card full-width">
      <h2>MEMBER REGISTRY <span style="color:var(--text-dim);font-size:0.7em" id="memberCount"></span></h2>
      <div id="membersList"><div style="color:var(--text-dim);font-style:italic;font-size:0.9rem">Loading…</div></div>
    </div>

    <!-- FAMILIES LIST -->
    <div class="section-card">
      <h2>FAMILY REGISTRY</h2>
      <div id="familiesList"><div style="color:var(--text-dim);font-style:italic;font-size:0.9rem">Loading…</div></div>
    </div>

    <!-- TIER CONFIG -->
    <div class="section-card">
      <h2>TIER THRESHOLDS</h2>
      <div id="tiersList"><div style="color:var(--text-dim);font-style:italic;font-size:0.9rem">Loading…</div></div>
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
        <label>TIER NAME</label>
        <input type="text" id="newTierName" placeholder="e.g. Diamond">
        <label>MIN POINTS</label>
        <input type="number" id="newTierMin" placeholder="e.g. 1500" min="0">
        <label>COLOR (hex)</label>
        <input type="text" id="newTierColor" placeholder="#aabbcc">
        <button class="btn btn-gold btn-sm" onclick="addTier()">Add Tier</button>
      </div>
    </div>

    <!-- DANGER ZONE -->
    <div class="section-card danger-zone full-width">
      <h2>PASSPHRASE</h2>
      <div class="form-row">
        <div>
          <label>NEW PASSPHRASE</label>
          <input type="password" id="newPassphrase" placeholder="New passphrase">
        </div>
        <div>
          <label>CONFIRM</label>
          <input type="password" id="confirmPassphrase" placeholder="Repeat">
        </div>
      </div>
      <button class="btn btn-danger" onclick="changePassphrase()">Update Passphrase</button>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue, push }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_PsKhCwuv7nlGBGv-c9AcZcTWgP9DPFk",
  authDomain: "laxtania-albion-quest-board.firebaseapp.com",
  databaseURL: "https://laxtania-albion-quest-board-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "laxtania-albion-quest-board",
  storageBucket: "laxtania-albion-quest-board.firebasestorage.app",
  messagingSenderId: "636241022279",
  appId: "1:636241022279:web:42d7af06401d9cdda89062"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASSPHRASE_KEY = 'prestige_admin_pp';
const SESSION_KEY = 'laxtania_prestige_admin';

let membersData = {};
let familiesData = {};
let tiersData = {};

// ── PASSPHRASE ──
async function getStoredPassphrase() {
  const snap = await get(ref(db, 'prestige/config/adminPassphrase'));
  return snap.val() || 'laxtania-council'; // default same as Quest Board
}

window.checkPassphrase = async function() {
  const input = document.getElementById('passphraseInput').value.trim();
  const stored = await getStoredPassphrase();
  if (input === stored) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    initListeners();
  } else {
    document.getElementById('gateError').textContent = 'Passphrase not recognised.';
    document.getElementById('passphraseInput').value = '';
  }
};

document.getElementById('passphraseInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.checkPassphrase();
});

if (sessionStorage.getItem(SESSION_KEY)) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  initListeners();
}

function initListeners() {
  onValue(ref(db, 'prestige/members'), snap => {
    membersData = snap.val() || {};
    renderMembersList();
    populateFamilyDropdowns();
  });
  onValue(ref(db, 'prestige/families'), snap => {
    familiesData = snap.val() || {};
    renderFamiliesList();
    populateFamilyDropdowns();
  });
  onValue(ref(db, 'prestige/tiers'), snap => {
    tiersData = snap.val() || {};
    renderTiersList();
  });
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── FAMILY DROPDOWNS ──
function populateFamilyDropdowns() {
  const selects = document.querySelectorAll('.family-select');
  const options = '<option value="">— No Family —</option>' +
    Object.entries(familiesData).map(([id, f]) =>
      `<option value="${id}">${f.name}</option>`).join('');
  selects.forEach(s => {
    const current = s.value;
    s.innerHTML = options;
    s.value = current;
  });
  // Also the add-member select
  const nm = document.getElementById('newMemberFamily');
  if (nm) {
    const cur = nm.value;
    nm.innerHTML = options;
    nm.value = cur;
  }
}

// ── MEMBERS ──
function renderMembersList() {
  const el = document.getElementById('membersList');
  const list = Object.entries(membersData).sort((a,b) => (b[1].points||0) - (a[1].points||0));
  document.getElementById('memberCount').textContent = `(${list.length})`;

  if (!list.length) {
    el.innerHTML = `<p style="color:var(--text-dim);font-style:italic">No members yet. Add the first hero.</p>`;
    return;
  }

  el.innerHTML = list.map(([id, m]) => {
    const familyName = m.familyId && familiesData[m.familyId] ? familiesData[m.familyId].name : '—';
    return `
      <div class="member-row" id="mrow-${id}">
        <div class="member-row-name">${m.name || id}</div>
        <div class="member-row-family">${familyName}</div>
        <div class="member-row-pts">${(m.points||0).toLocaleString()} pts</div>
        <button class="btn btn-gold btn-sm" onclick="toggleMemberEdit('${id}')">Edit</button>
        <button class="btn btn-danger" onclick="deleteMember('${id}','${m.name||id}')">✕</button>
        <div class="member-edit-form" id="medit-${id}">
          <div class="form-row">
            <div>
              <label>NAME</label>
              <input type="text" id="mn-${id}" value="${m.name||''}">
            </div>
            <div>
              <label>ROLE</label>
              <select id="mr-${id}">
                <option value="member" ${m.role==='member'?'selected':''}>Member</option>
                <option value="officer" ${m.role==='officer'?'selected':''}>Officer</option>
                <option value="co-leader" ${m.role==='co-leader'?'selected':''}>Co-Leader</option>
                <option value="leader" ${m.role==='leader'?'selected':''}>Leader</option>
              </select>
            </div>
            <div>
              <label>FAMILY</label>
              <select id="mf-${id}" class="family-select">
                <option value="">— No Family —</option>
                ${Object.entries(familiesData).map(([fid,f]) =>
                  `<option value="${fid}" ${m.familyId===fid?'selected':''}>${f.name}</option>`).join('')}
              </select>
            </div>
            <div>
              <label>PRESTIGE POINTS</label>
              <input type="number" id="mp-${id}" value="${m.points||0}" min="0">
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-gold btn-sm" onclick="saveMember('${id}')">Save</button>
            <button class="btn btn-sm" style="border-color:var(--text-dim);color:var(--text-dim)" onclick="toggleMemberEdit('${id}')">Cancel</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

window.toggleMemberEdit = function(id) {
  const el = document.getElementById('medit-' + id);
  el.classList.toggle('open');
};

window.saveMember = async function(id) {
  const name  = document.getElementById('mn-' + id).value.trim();
  const role  = document.getElementById('mr-' + id).value;
  const fam   = document.getElementById('mf-' + id).value;
  const pts   = parseInt(document.getElementById('mp-' + id).value) || 0;
  await update(ref(db, 'prestige/members/' + id), { name, role, familyId: fam, points: pts });
  toast(`${name} updated.`);
  document.getElementById('medit-' + id).classList.remove('open');
};

window.deleteMember = async function(id, name) {
  if (!confirm(`Remove ${name} from the Registry?`)) return;
  await remove(ref(db, 'prestige/members/' + id));
  toast(`${name} removed.`);
};

window.openAddMember = function() {
  const card = document.getElementById('addMemberCard');
  card.style.display = card.style.display === 'none' ? 'block' : 'none';
};

window.addMember = async function() {
  const name = document.getElementById('newMemberName').value.trim();
  if (!name) { toast('Enter a name.'); return; }
  const role = document.getElementById('newMemberRole').value;
  const fam  = document.getElementById('newMemberFamily').value;
  const pts  = parseInt(document.getElementById('newMemberPoints').value) || 0;
  const newRef = push(ref(db, 'prestige/members'));
  await set(newRef, { name, role, familyId: fam, points: pts });
  toast(`${name} recorded in the Registry.`);
  document.getElementById('newMemberName').value = '';
  document.getElementById('newMemberPoints').value = '0';
  document.getElementById('addMemberCard').style.display = 'none';
};

// ── FAMILIES ──
function renderFamiliesList() {
  const el = document.getElementById('familiesList');
  const list = Object.entries(familiesData);
  if (!list.length) {
    el.innerHTML = `<p style="color:var(--text-dim);font-style:italic">No families yet.</p>`;
    return;
  }
  el.innerHTML = list.map(([id, f]) => `
    <div class="family-row">
      <div class="family-row-header">
        <div class="family-row-name">${f.name}</div>
        <div class="family-row-bonus">${f.bonusPoints ? '+' + f.bonusPoints + ' bonus' : ''}</div>
        <button class="btn btn-gold btn-sm" onclick="toggleFamilyEdit('${id}')">Edit</button>
        <button class="btn btn-danger" onclick="deleteFamily('${id}','${f.name}')">✕</button>
      </div>
      <div class="family-edit-form" id="fedit-${id}">
        <label>FAMILY NAME</label>
        <input type="text" id="fn-${id}" value="${f.name||''}">
        <label>BONUS POINTS</label>
        <input type="number" id="fb-${id}" value="${f.bonusPoints||0}" min="0">
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn btn-gold btn-sm" onclick="saveFamily('${id}')">Save</button>
          <button class="btn btn-sm" style="border-color:var(--text-dim);color:var(--text-dim)" onclick="toggleFamilyEdit('${id}')">Cancel</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.toggleFamilyEdit = function(id) {
  document.getElementById('fedit-' + id).classList.toggle('open');
};

window.saveFamily = async function(id) {
  const name  = document.getElementById('fn-' + id).value.trim();
  const bonus = parseInt(document.getElementById('fb-' + id).value) || 0;
  await update(ref(db, 'prestige/families/' + id), { name, bonusPoints: bonus });
  toast(`${name} updated.`);
  document.getElementById('fedit-' + id).classList.remove('open');
};

window.deleteFamily = async function(id, name) {
  if (!confirm(`Dissolve ${name}? Members will lose their Family assignment.`)) return;
  await remove(ref(db, 'prestige/families/' + id));
  // Clear familyId from affected members
  const updates = {};
  Object.entries(membersData).forEach(([mid, m]) => {
    if (m.familyId === id) updates[`prestige/members/${mid}/familyId`] = '';
  });
  if (Object.keys(updates).length) await update(ref(db), updates);
  toast(`${name} dissolved.`);
};

window.openAddFamily = function() {
  const card = document.getElementById('addFamilyCard');
  card.style.display = card.style.display === 'none' ? 'block' : 'none';
};

window.addFamily = async function() {
  const name  = document.getElementById('newFamilyName').value.trim();
  if (!name) { toast('Enter a family name.'); return; }
  const bonus = parseInt(document.getElementById('newFamilyBonus').value) || 0;
  const newRef = push(ref(db, 'prestige/families'));
  await set(newRef, { name, bonusPoints: bonus });
  toast(`${name} established.`);
  document.getElementById('newFamilyName').value = '';
  document.getElementById('newFamilyBonus').value = '0';
  document.getElementById('addFamilyCard').style.display = 'none';
};

// ── TIERS ──
function renderTiersList() {
  const el = document.getElementById('tiersList');
  const list = Object.entries(tiersData).sort((a,b) => a[1].minPts - b[1].minPts);
  if (!list.length) {
    // Seed defaults
    const defaults = [
      { name:"Iron",     minPts:0,    color:"#8a9bb0" },
      { name:"Bronze",   minPts:100,  color:"#cd7f32" },
      { name:"Silver",   minPts:300,  color:"#c0c0c0" },
      { name:"Gold",     minPts:600,  color:"#c9a84c" },
      { name:"Platinum", minPts:1000, color:"#5fd4f4" },
      { name:"Sovereign",minPts:2000, color:"#e85d8a" },
    ];
    defaults.forEach(t => push(ref(db, 'prestige/tiers'), t));
    el.innerHTML = `<p style="color:var(--text-dim);font-style:italic">Seeding default tiers…</p>`;
    return;
  }
  el.innerHTML = list.map(([id, t]) => `
    <div class="tier-config-row">
      <div class="tier-color-dot" style="background:${t.color}"></div>
      <div class="tier-config-name">${t.name}</div>
      <div class="tier-config-pts">${t.minPts}+ pts</div>
      <button class="btn btn-danger" onclick="deleteTier('${id}','${t.name}')">✕</button>
    </div>
  `).join('');
}

window.addTier = async function() {
  const name  = document.getElementById('newTierName').value.trim();
  const min   = parseInt(document.getElementById('newTierMin').value);
  const color = document.getElementById('newTierColor').value.trim();
  if (!name || isNaN(min) || !color) { toast('Fill all tier fields.'); return; }
  await push(ref(db, 'prestige/tiers'), { name, minPts: min, color });
  toast(`Tier "${name}" added.`);
  document.getElementById('newTierName').value = '';
  document.getElementById('newTierMin').value = '';
  document.getElementById('newTierColor').value = '';
};

window.deleteTier = async function(id, name) {
  if (!confirm(`Remove tier "${name}"?`)) return;
  await remove(ref(db, 'prestige/tiers/' + id));
  toast(`Tier "${name}" removed.`);
};

// ── PASSPHRASE ──
window.changePassphrase = async function() {
  const np = document.getElementById('newPassphrase').value;
  const cp = document.getElementById('confirmPassphrase').value;
  if (!np) { toast('Enter a new passphrase.'); return; }
  if (np !== cp) { toast('Passphrases do not match.'); return; }
  await set(ref(db, 'prestige/config/adminPassphrase'), np);
  toast('Passphrase updated.');
  document.getElementById('newPassphrase').value = '';
  document.getElementById('confirmPassphrase').value = '';
};
</script>
</body>
</html>
